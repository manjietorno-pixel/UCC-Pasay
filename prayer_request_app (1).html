<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prayer Request Form</title>
  <!-- Replace the value of SCRIPT_URL in the script section with your Google Apps Script Web App URL -->
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #e4ecf7);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 560px;
      background: #ffffff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 { margin: 0 0 8px; font-size: 28px; text-align: center; }

    p.subtitle {
      margin: 0 0 24px;
      text-align: center;
      color: #6b7280;
      font-size: 15px;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }

    input, select, textarea, button { width: 100%; font: inherit; }

    input, select, textarea {
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 18px;
      background: #fff;
    }

    textarea { min-height: 140px; resize: vertical; }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .radio-group {
      margin-bottom: 18px;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .radio-option input { width: auto; }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .checkbox-row input { width: auto; margin: 0; }

    button {
      border: none;
      border-radius: 10px;
      padding: 14px;
      background: #4f46e5;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: #4338ca; }

    .success {
      display: none;
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
      text-align: center;
      font-size: 14px;
    }

    .note {
      margin-top: 16px;
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      line-height: 1.5;
    }

    @media (max-width: 640px) {
      .row { grid-template-columns: 1fr; }
      .container { padding: 22px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Prayer Request</h1>
    <p class="subtitle">Share your prayer request or praise report. Our church team will keep you in prayer.</p>

    <form id="prayerForm">
      <div class="row">
        <div>
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your name" />
        </div>

        <div>
          <label for="type">Type</label>
          <select id="type" name="type" required>
            <option value="">Select one</option>
            <option value="Prayer Request">Prayer Request</option>
            <option value="Praise Report">Praise Report</option>
          </select>
        </div>
      </div>

      <label for="message">Your message</label>
      <textarea id="message" name="message" placeholder="Write your prayer request or praise report here..." required></textarea>

      <label>Who can see this?</label>
      <div class="radio-group">
        <div class="radio-option">
          <input type="radio" id="pastors" name="visibility" value="Pastors Only" required />
          <label for="pastors">Pastors only</label>
        </div>
        <div class="radio-option">
          <input type="radio" id="group" name="visibility" value="Share to Group" />
          <label for="group">Pwede po ishare sa group</label>
        </div>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="anonymous" name="anonymous" />
        <label for="anonymous">Submit as anonymous</label>
      </div>

      <button type="submit">Submit</button>
    </form>

    <div class="success" id="successMessage">
      Thank you. Your message has been received.
    </div>

    <p class="note">
      Note: This form currently does NOT store submissions yet. To view all requests, you need to connect this to a backend like Google Sheets or Formspree.
    </p>
  </div>

  <script>
    const SCRIPT_URL = 'https://docs.google.com/spreadsheets/d/1TKtRa2tjaXfIYPZCYapEP9R-o16VwilYCq4pnyLfFJU/edit?usp=sharing';

    const form = document.getElementById('prayerForm');
    const successMessage = document.getElementById('successMessage');
    const submitButton = form.querySelector('button[type="submit"]');

    form.addEventListener('submit', async function (event) {
      event.preventDefault();

      if (SCRIPT_URL === 'https://docs.google.com/spreadsheets/d/1TKtRa2tjaXfIYPZCYapEP9R-o16VwilYCq4pnyLfFJU/edit?usp=sharing') {
        alert('Please add your Google Apps Script Web App URL first.');
        return;
      }

      const anonymous = document.getElementById('anonymous').checked;
      const nameField = document.getElementById('name');
      const typeField = document.getElementById('type');
      const messageField = document.getElementById('message');
      const visibilityField = document.querySelector('input[name="visibility"]:checked');

      const payload = {
        name: anonymous ? 'Anonymous' : (nameField.value.trim() || 'Anonymous'),
        type: typeField.value,
        message: messageField.value.trim(),
        visibility: visibilityField ? visibilityField.value : '',
        anonymous: anonymous ? 'Yes' : 'No',
        submittedAt: new Date().toLocaleString()
      };

      try {
        submitButton.disabled = true;
        submitButton.textContent = 'Submitting...';

        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'cors',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.result === 'success') {
          successMessage.style.display = 'block';
          successMessage.textContent = 'Thank you. Your message has been submitted.';
          form.reset();
        } else {
          throw new Error(result.message || 'Submission failed.');
        }
      } catch (error) {
        successMessage.style.display = 'block';
        successMessage.style.background = '#fef2f2';
        successMessage.style.color = '#991b1b';
        successMessage.style.border = '1px solid #fecaca';
        successMessage.textContent = 'Submission failed. Please try again.';
        console.error(error);
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = 'Submit';
      }
    });
  </script>
</body>
</html>
