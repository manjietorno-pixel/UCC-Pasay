<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbygUo7SL3totMsn5-MGG3w1r5EIWUGj5HEst_MWk0-GwwI_zdvAeMcqAVgpX9dPXUPH/exec';

  const form = document.getElementById('prayerForm');
  const statusMessage = document.getElementById('statusMessage');

  function showStatus(message, type) {
    statusMessage.className = 'status ' + type;
    statusMessage.textContent = message;
    statusMessage.style.display = 'block';
  }

  function resetStatus() {
    statusMessage.className = 'status';
    statusMessage.textContent = '';
    statusMessage.style.display = 'none';
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    resetStatus();

    const anonymousChecked = document.getElementById('anonymous').checked;
    const selectedVisibility = document.querySelector('input[name="visibility"]:checked');

    const payload = {
      name: anonymousChecked
        ? 'Anonymous'
        : (document.getElementById('name').value.trim() || 'Anonymous'),
      contact: document.getElementById('contact').value.trim(),
      type: document.getElementById('type').value,
      message: document.getElementById('message').value.trim(),
      visibility: selectedVisibility ? selectedVisibility.value : '',
      anonymous: anonymousChecked ? 'Yes' : 'No',
      submittedAt: new Date().toISOString()
    };

    try {
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'cors',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify(payload)
      });

      const text = await res.text();

      if (!res.ok) {
        throw new Error('Request failed with status ' + res.status + ': ' + text);
      }

      let result;
      try {
        result = JSON.parse(text);
      } catch (parseError) {
        throw new Error('Invalid server response: ' + text);
      }

      if (result.result === 'success') {
        showStatus('Submitted successfully.', 'success');
        form.reset();
      } else {
        throw new Error(result.message || 'Submission failed.');
      }
    } catch (err) {
      console.error(err);
      showStatus('Failed to fetch or submit. Check your Apps Script deployment and URL.', 'error');
    }
  });

  window.runTests = function () {
    return [
      { name: 'Form exists', pass: !!form },
      { name: 'Contact field exists', pass: !!document.getElementById('contact') },
      { name: 'Status message exists', pass: !!statusMessage },
      { name: 'Script URL is set', pass: !!SCRIPT_URL && SCRIPT_URL !== 'PASTE_YOUR_LATEST_APPS_SCRIPT_EXEC_URL_HERE' }
    ];
  };
</script>
